# Ricarica config con Ctrl+b then r
bind r source-file ~/.tmux.conf

# Numera i riquadri da 1 (invece di 0, più comodo)
set -g base-index 1

# Colori migliorati
set -g default-terminal "tmux-256color"

# Mouse abilitato
set -g mouse on

# Stato bar migliorato
set -g status-bg colour237
set -g status-fg colour247